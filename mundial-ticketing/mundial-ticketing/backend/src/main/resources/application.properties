# ============================================================
#  SERVIDOR
# ============================================================
server.port=8080

# ============================================================
#  BASE DE DATOS MySQL
#  Los valores reales se configuran mediante variables de entorno
#  (DB_URL, DB_USERNAME, DB_PASSWORD). Los valores de abajo son
#  fallback para desarrollo local si no se define ninguna variable.
# ============================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mundial_ticketing?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexiones (HikariCP viene por defecto con Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ============================================================
#  JWT
#  El secreto real se configura mediante la variable de entorno
#  JWT_SECRET. El valor de abajo es solo fallback para desarrollo
#  local y NUNCA debe usarse en producción.
# ============================================================
jwt.secret=${JWT_SECRET:secreto_default_solo_para_desarrollo_local_cambiar_siempre}
jwt.expiration-ms=86400000

# ============================================================
#  LOGGING
# ============================================================
logging.level.com.ucu.ticketing=DEBUG
logging.level.org.springframework.jdbc=DEBUG